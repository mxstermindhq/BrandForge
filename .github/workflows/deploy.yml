name: Deploy BrandForge

on:
  push:
    branches: [main, master]
    paths:
      - 'web/**'
      - 'src/**'
      - 'server.js'
      - 'package.json'
      - 'railway.json'
      - '.github/workflows/deploy.yml'
      - 'supabase/migrations/**'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build and deploy web to Cloudflare
  deploy-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./web/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for Cloudflare
        run: npm run cf:build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: brandforge
          directory: .open-next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # Deploy API server to Railway
  deploy-api:
    runs-on: ubuntu-latest
    needs: deploy-web
    # Only run if backend files changed
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.modified, 'server.js') ||
      contains(github.event.head_commit.modified, 'src/') ||
      contains(github.event.head_commit.modified, 'package.json') ||
      contains(github.event.head_commit.modified, 'railway.json')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      
      - name: Deploy to Railway
        run: railway up --service brandforge-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
